<div class="px-4 md:px-5 py-3 bg-surface border-b border-slate-100 sticky top-0 z-50">
  <div class="flex items-center gap-2">

    <!-- Input field -->
    <div class="flex items-center flex-1 bg-white border border-slate-200 rounded-lg shadow-sm overflow-hidden">
      <!-- Brain icon -->
      <img src="assets/images/Brain Chat.png" alt="Brain" class="w-10 h-10 object-contain shrink-0 ml-4 mr-2" />

      <input
        class="flex-1 border-none bg-transparent text-sm text-[#1F2937] outline-none placeholder:text-slate-400 py-5 pr-3"
        type="text"
        placeholder="What's in your mind?"
        [(ngModel)]="query"
        (keydown)="onKeydown($event)"
      />
    </div>

    <!-- Send button: separated with gap -->
    <button
      class="flex items-center justify-center w-12 h-12 bg-[#2563EB] rounded-lg text-white cursor-pointer shrink-0 hover:bg-blue-700 transition-colors shadow-sm"
      (click)="onSend()"
      aria-label="Send"
    >
      <img src="assets/Icon/send-01.png" alt="Send" class="w-12 h-12 object-contain" />
    </button>

  </div>
</div>
